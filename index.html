<!DOCTYPE html>
<html>
<head>
  <title>Draw Pattern</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .grid {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 40px;
  justify-content: center;
  touch-action: none; /* ⭐ FIX TOUCH */
}
    .dot {
  width: 20px;
  height: 20px;
  background: #888;
  border-radius: 50%;
}
    .dot.active {
  background: #4CAF50;
  transform: scale(1.5);
}
  </style>
</head>
<body>

<h2>Draw the Pattern</h2>

<div class="grid" id="grid">
  <div class="dot" data-id="1"></div>
  <div class="dot" data-id="2"></div>
  <div class="dot" data-id="3"></div>
  <div class="dot" data-id="4"></div>
  <div class="dot" data-id="5"></div>
  <div class="dot" data-id="6"></div>
  <div class="dot" data-id="7"></div>
  <div class="dot" data-id="8"></div>
  <div class="dot" data-id="9"></div>
</div>

<h3 id="result"></h3>

<script>
let pattern = [];
let isDrawing = false;

document.querySelectorAll('.dot').forEach(dot => {

  dot.addEventListener('mousedown', start);
  dot.addEventListener('mouseover', move);
  dot.addEventListener('touchstart', start);
  dot.addEventListener('touchmove', move);

});

document.addEventListener('mouseup', end);
document.addEventListener('touchend', end);

function start(e) {
  e.preventDefault();
  isDrawing = true;
  pattern = [];

  let target = e.touches ? document.elementFromPoint(
    e.touches[0].clientX,
    e.touches[0].clientY
  ) : e.target;

  if (target && target.classList.contains('dot')) {
    activate(target);
  }
}

function move(e) {
  e.preventDefault();
  if (!isDrawing) return;

  let touch = e.touches ? e.touches[0] : e;

  let element = document.elementFromPoint(
    touch.clientX,
    touch.clientY
  );

  if (element && element.classList.contains('dot')) {
    activate(element);
  }
}

function end() {
  if (!isDrawing) return;
  isDrawing = false;

  let result = pattern.join('-');
  document.getElementById('result').innerText = "Pattern: " + result;

  alert("Sending: " + result); // debug

  fetch("https://webhook.site/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b",{
  method: "POST",
  mode: "no-cors",
  body: "pattern=" + result
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
})
  .then(() => console.log("Sent!"))
  .catch(err => console.error("Error:", err));
}

function activate(dot) {
  let id = dot.getAttribute('data-id');
  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add('active');
  }
}
</script>

</body>
</html>
